# ═══════════════════════════════════════════════════════════════════
# mcp-runtime.yml — Workflow principal de execução.
#
# Design:
#   - Cada MCP é uma "máquina isolada" executando em seu próprio job.
#   - O registry (API) roda primeiro e expõe o catálogo.
#   - Workers executam em matrix, cada um lendo seu manifesto e executando.
#   - Coleta final consolida resultados.
#   - Cache inteligente: restaura snapshot se lockfile não mudou.
# ═══════════════════════════════════════════════════════════════════

name: MCP Runtime

on:
  workflow_dispatch:
    inputs:
      mcp_ids:
        description: 'MCPs para executar (separados por vírgula, vazio = todos)'
        required: false
        type: string
      input_payload:
        description: 'Payload de entrada JSON (opcional)'
        required: false
        type: string
        default: '{}'
      mcp_id:
        description: 'ID específico do MCP (vazio = todos)'
        required: false
        type: string
        default: ''

env:
  PYTHON_VERSION: '3.12'
  REGISTRY_PORT: 8712

jobs:
  # ── 1. REGISTRY ────────────────────────────────────────────────
  registry:
    name: Registry
    runs-on: ubuntu-22.04
    outputs:
      cache_key: ${{ steps.compute-key.outputs.key }}
      mcp_ids: ${{ steps.list-mcps.outputs.ids }}
      manifest_hashes: ${{ steps.list-mcps.outputs.hashes }}

    steps:
      - uses: actions/checkout@v4

      - name: Compute snapshot key
        id: compute-key
        run: |
          KEY=$(python3 scripts/compute-key.py)
          echo "key=$KEY" >> "$GITHUB_OUTPUT"
          echo "Snapshot key: $KEY"

      - name: Restore snapshot (cache inteligente)
        id: cache
        uses: actions/cache@v4
        with:
          path: |
            .venv
            registry/data/registry.db
            .cache/snapshot
          key: ${{ steps.compute-key.outputs.key }}
          restore-keys: |
            mcp-snapshot-v1-

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}
          cache: pip

      - name: Install dependencies
        run: |
          python3 -m venv .venv
          .venv/bin/pip install --upgrade pip -q
          .venv/bin/pip install -r requirements.txt -q

      - name: Build DB snapshot
        run: |
          mkdir -p registry/data
          .venv/bin/python3 scripts/build-db.py

      - name: List MCPs
        id: list-mcps
        run: |
          .venv/bin/python3 scripts/list-mcps.py "${{ github.event.inputs.mcp_id }}" >> "$GITHUB_OUTPUT"

      - name: Save snapshot after cache miss
        if: steps.cache.outputs.cache-hit != 'true'
        run: |
          mkdir -p .cache/snapshot
          cp -a .venv .cache/snapshot/.venv 2>/dev/null || true
          cp -a registry/data/registry.db .cache/snapshot/registry/data/ 2>/dev/null || true
          cp mcps-lock.json .cache/snapshot/

  # ── 2. WORKERS (MATRIX) ────────────────────────────────────────
  worker:
    name: Worker ${{ matrix.mcp_id }}
    runs-on: ubuntu-22.04
    needs: registry
    strategy:
      fail-fast: false
      matrix:
        mcp_id: ${{ fromJSON(needs.registry.outputs.mcp_ids) }}

    steps:
      - uses: actions/checkout@v4

      - name: Restore snapshot
        uses: actions/cache@v4
        with:
          path: |
            .venv
            registry/data/registry.db
            .cache/snapshot
          key: ${{ needs.registry.outputs.cache_key }}

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}

      - name: Execute MCP function
        id: execute
        run: |
          .venv/bin/python3 scripts/execute-mcp.py "${{ matrix.mcp_id }}"

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: output-${{ matrix.mcp_id }}
          path: ${{ matrix.mcp_id }}_output.json

  # ── 3. COLLECT ─────────────────────────────────────────────────
  collect:
    name: Collect Results
    runs-on: ubuntu-22.04
    needs: worker
    if: always()

    steps:
      - uses: actions/checkout@v4

      - name: Download all artifacts
        uses: actions/download-artifact@v4

      - name: Consolidate
        run: |
          python3 scripts/consolidate.py

      - name: Upload consolidated
        uses: actions/upload-artifact@v4
        with:
          name: results-consolidated
          path: _results.json
